name: freeway_app
description: "Freeway Insurance Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.1.14
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  intl: ^0.20.1
  curved_navigation_bar: ^1.0.3
  lottie: ^3.0.0
  smooth_page_indicator: ^1.1.0
  shared_preferences: ^2.2.2
  animate_do: ^4.0.1
  flutter_svg: ^2.0.9
  flutter_credit_card: ^4.0.1
  modal_bottom_sheet: ^3.0.0
  circular_profile_avatar: ^2.0.5
  # Location dependencies
  google_maps_flutter: ^2.10.1
  geolocator: ^11.0.0
  geocoding: ^2.1.1
  # API REST dependencies
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  http: ^1.2.0
  toggle_switch: ^2.3.0
  flutter_card_swiper: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  mockito: ^5.4.4
  # API REST dev dependencies
  retrofit_generator: ^7.0.8
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  custom_lint: ^0.7.0

flutter:
  uses-material-design: true
  
  fonts:
    - family: Open Sans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700

  assets:
    - assets/prefix.png
    - assets/auth/freeway_logo.png
    - assets/auth/
    - assets/home/icons/
    - assets/home/banners/insurance4.0x/
    - assets/home/idcardicons/
    - assets/home/idcardicons/add_apple_wallet.png
    - assets/home/idcardicons/card_id.png
    - assets/shared/
    - assets/splash/
    - assets/menu/
    - assets/profile/
    - assets/payments/
    - assets/products/
    - assets/products/vehicle/
    - assets/products/4.0x/
    - assets/products/vehiclepng/4.0x/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Freewayfavi2.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/auth/Freewayfavi2.png"
  name: "freeway"
  web:
    generate: true
    image_path: "assets/auth/Freewayfavi2.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
