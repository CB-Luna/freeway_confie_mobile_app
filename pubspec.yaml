name: freeway_app
description: "Freeway Application"
publish_to: "none"

version: 1.0.8+22

environment:
  sdk: ">=3.0.6 <4.0.0"

dependencies:
  animate_do: ^4.0.1
  circular_profile_avatar: ^2.0.5
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.8
  curved_navigation_bar: ^1.0.3
  device_info_plus: ^9.1.2
  dio: ^5.4.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_card_swiper: ^6.0.0
  flutter_credit_card: ^4.0.1
  flutter_spinkit: ^5.2.1
  flutter_svg: ^2.0.9
  flutter_secure_storage: ^9.0.0
  geocoding: ^2.1.1
  geolocator: ^11.0.0
  get_it: ^8.0.3
  google_maps_flutter: ^2.10.1
  http: ^1.2.0
  intl: ^0.19.0
  intl_phone_field: ^3.2.0
  json_annotation: ^4.8.1
  local_auth: ^2.1.8
  lottie: ^3.0.0
  mask_text_input_formatter: ^2.9.0
  modal_bottom_sheet: ^3.0.0
  package_info_plus: ^8.0.0
  provider: ^6.1.1
  retrofit: ^4.0.3
  # rive_animated_icon: ^2.0.3  # Removido por incompatibilidad con 16KB page size
  shared_preferences: ^2.2.2
  smooth_page_indicator: ^1.1.0
  toggle_switch: ^2.3.0
  url_launcher: ^6.1.14
  uuid: ^4.5.1
  webview_flutter: ^4.7.0
  printing: ^5.14.2
  pdf: ^3.11.3
  apple_passkit: 1.3.0
  flutter_wallet_card: ^3.3.0

dev_dependencies:
  build_runner: ^2.4.7
  custom_lint: ^0.7.0
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.7.1
  mockito: ^5.4.5
  # API REST dev dependencies
  retrofit_generator: ^7.0.8

flutter:
  uses-material-design: true

  fonts:
    - family: Open Sans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700

  assets:
    - assets/prefix.png
    - assets/footer_image.png
    - assets/auth/freeway_logo.png
    - assets/auth/
    - assets/home/icons/
    - assets/home/banners/insurance4.0x/
    - assets/home/idcardicons/
    - assets/home/idcardicons/add_apple_wallet.png
    - assets/home/idcardicons/card_id.png
    - assets/home/idcardicons/policy_type/
    - assets/home/idcardicons/logo_type/
    - assets/home/animations/
    - assets/splash/
    - assets/profile/
    - assets/payments/
    - assets/products/
    - assets/products/4.0x/
    - assets/products/vehiclepng/4.0x/
    - assets/products/propertypng/4.0x/
    - assets/products/businesspng/4.0x/
    - assets/products/personalpng/4.0x/
    - assets/products/additionalpng/4.0x/
    - assets/location/
    - assets/loading/
    - assets/i18n/
    - assets/Coupon.pkpass

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Freewayfavi2.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/auth/Freewayfavi2.png"
  name: "freeway"
  web:
    generate: true
    image_path: "assets/auth/Freewayfavi2.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
